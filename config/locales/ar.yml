  onboarding:
    ethical_charter: |
      إنه أنا مجددًا!

      في Entourage، نحرص فعلاً على أن يشعر كل شخص بالراحة والأمان، وأن يتم الإصغاء إليه واستقباله. لهذا السبب كتبنا هذا الميثاق الأخلاقي، الذي يلتزم جميع أعضاء المجتمع باحترامه عند الانضمام إلى التطبيق. اطّلع عليه هنا:

      https://www.entourage.social/app/resources/eMU_InNSSJbE

      إلى اللقاء قريبًا!

      %s

  outings:
    tasks:
      reminder_content: |
        هذا الحدث يقترب بسرعة! إذا كنت لا تزال مهتمًا بالمشاركة، يرجى التعليق بـ "أنا مشارك" على هذه الرسالة.
      reminder_7_days_with_participants: |
        مرحبًا %{first_name}،

        شكرًا جزيلاً على تنظيم %{title}، إنها مبادرة رائعة لنسج الروابط! 🙌

        👉 ألاحظ أن موعد حدثكم يقترب وأن %{count} أشخاص قد سجّلوا بالفعل، هذا رائع! لمساعدتهم على عدم النسيان، يمكنكم كتابة رسالة صغيرة في نقاش الحدث.

        وإذا كنتم ترغبون في تسجيل المزيد من الجيران، أنصحكم بمشاركة رابط الحدث في مجموعة %{neighborhood} الخاصة بكم: قد يُحدث ذلك فرقًا كبيرًا! إليكم الرابط: %{link}

        إذا احتجتم إلى أي مساعدة، لا تترددوا في إخباري.

        شكرًا على التزامكم ورغبتكم في نسج الروابط 🙏
        إلى اللقاء قريبًا
      reminder_7_days_without_participants: |
        مرحبًا %{first_name}،

        شكرًا جزيلاً على تنظيم %{title}، إنها مبادرة رائعة لنسج الروابط! 🙌

        ألاحظ أن موعد حدثكم يقترب لكن لم يسجّل أحد بعد. لا داعي للقلق: غالبًا ما تتحرك الأمور في اللحظة الأخيرة 😉

        أنصحكم بمشاركة رابط الحدث في مجموعة %{neighborhood} الخاصة بكم: قد يُحدث ذلك فرقًا كبيرًا! إليكم الرابط: %{link}

        إذا احتجتم إلى أي مساعدة، لا تترددوا في إخباري.

        شكرًا على التزامكم ورغبتكم في نسج الروابط 🙏
        إلى اللقاء قريبًا
      reminder_1_day_with_participants: |
        مرحبًا %{first_name}،

        حدثكم %{title} يُقام غدًا!
        ألف مبروك على هذه المبادرة الجميلة 💪

        إليكم بعض النصائح البسيطة لخلق لحظة ودية وشاملة للجميع:

        🌟 استقبال كل مشارك(ة) بشكل شخصي بكلمة لطيفة وابتسامة
        🌟 إطلاق نشاط للتعارف (ألعاب كسر الجليد، جولة الأسماء، إلخ) لتخفيف الأجواء
        🌟 الانتباه لكل شخص: مساعدة من قد يشعر بالتهميش على إيجاد مكانه

        في نهاية الحدث، لا تترددوا في التقاط صورة جماعية (مع التأكد من موافقة كل مشارك) ونشرها في مجموعة الجيران %{neighborhood} 👌

        شكرًا على التزامكم وكرمكم. أنتم تساهمون في نسج حيّ أكثر تضامنًا 💛

        إلى اللقاء قريبًا
      reminder_1_day_without_participants: |
        مرحبًا %{first_name}،

        حدثكم %{title} يُقام غدًا! مبروك على هذه المبادرة 👏

        حتى لو لم يسجّل أحد بعد، لا شيء ضائع: أحيانًا يقرر الجيران في اللحظة الأخيرة!

        إليكم بعض الأفكار لتحفيز الجميع:
        💬 إرسال رسالة في نقاش الحدث
        📣 مشاركة الرابط في مجموعة الجيران %{neighborhood}
        🤝 دعوة الجيران الذين تعرفونهم أو تواصلتم معهم من قبل مباشرة

        وإذا وجدتم أنفسكم وحيدين غدًا، فهذا ليس فشلاً! لقد قمتم بالفعل بالأصعب: المبادرة لنسج الروابط 💛

        شكرًا على التزامكم. نحن هنا إذا احتجتم إلى أي مساعدة 🙌

        إلى اللقاء قريبًا

