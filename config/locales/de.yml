  smalltalks:
    messager:
      new_member: | # first_name
        Willkommen %s 🙂 Wir freuen uns sehr, dass du dabei bist! Stell dich doch kurz vor, damit die Gruppe dich besser kennenlernen kann.
      destroy_member: | # first_name
        %s hat die Gruppe verlassen. Vielen Dank für deine Teilnahme und alles Gute für deinen weiteren Weg!
      banned_member: | # first_name
        %s ist nicht mehr Teil der Gruppe. Sein/ihr Verhalten passte nicht ganz zum Geist der solidarischen Gruppen. Wir zählen auf euch, diesen Raum weiterhin mit Freundlichkeit und guter Laune zu füllen 🙏
      incomplete: |
        Wir stellen gerade eine tolle Gute-Vibes-Gruppe für euch zusammen ✨ Während wir noch auf die nächsten Personen warten, eine kleine Herausforderung: Versucht den Vornamen der nächsten Person zu erraten, die beitritt. Die Chancen stehen schlecht... aber wer weiß? 👀
      close: |
        Alle Mitglieder dieser Gute-Vibes-Gruppe haben beschlossen, die Unterhaltung zu verlassen, du bist also allein hier zurückgeblieben. Die Gruppe ist jetzt geschlossen. Du kannst den Gesprächsverlauf jederzeit einsehen und bei Bedarf zurückkehren.

        Wenn du weiterhin Gute Vibes teilen möchtest, zögere nicht, eine neue Anfrage zu stellen, um einer anderen Gruppe beizutreten. Bis bald 👋
      complete: |
        Die Gruppe ist komplett! 🎉

        Willkommen in eurer Gute-Vibes-Gruppe, einem Ort, um ganz einfach und mit Wohlwollen Verbindungen zu knüpfen ✨

        Eure Mission: austauschen, teilen und warum nicht euch treffen, per Video oder im echten Leben?
        Hier ist der Link für ein erstes gemeinsames Video-Treffen: %s

        👋 Stellt euch gerne vor, falls ihr das noch nicht getan habt.

        🔥 Und ab morgen... geht's los mit 7 Tagen kleiner Challenges, um einander besser kennenzulernen und echte Verbindungen zu knüpfen 🫶

        Wir zählen auf euch, dass ihr richtig mitmacht! 😉
      complete_j1: |
        Challenge des Tages: Drei Wahrheiten, eine Lüge – erzähl drei wahre Dinge über dich und eine Lüge. Die anderen müssen raten, was nicht stimmt!
      complete_j2: |
        Challenge des Tages: Gestern in meinem Leben... Erzähl deinen gestrigen Tag nur mit drei Emojis. Die anderen versuchen zu erraten, was passiert ist!
      complete_j3: |
        Stellt der Gruppe die interessanteste Frage, auf die ihr nie eine zufriedenstellende Antwort gefunden habt. Mal sehen, ob die Gruppe euch helfen kann, darüber nachzudenken!
      complete_j4: |
        Challenge des Tages: Teile etwas Kleines, das man dir nicht auf den ersten Blick ansieht – eine Leidenschaft, eine Gewohnheit, ein Charakterzug...
      complete_j5: |
        Challenge des Tages: Für 24 Stunden ist ein gängiges Wort in der Gruppe verboten (z. B. „ja", „ich", „essen"). Wer es schreibt... muss eine lustige Anekdote über sich erzählen!
      complete_j6: |
        Challenge des Tages: Jede*r teilt, was ihr/ihm hilft, auf jemanden zuzugehen: ein Blick, ein Ort, ein Satz... oder ein Anti-Schüchternheits-Trick!
      complete_j7: |
        Challenge des Tages: Teile eine schöne bevorstehende Veranstaltung in deiner Nähe oder online! Wenn jemand anderes dieselbe oder eine ähnliche Veranstaltung erwähnt, ist das vielleicht der perfekte Moment, gemeinsam hinzugehen (oder sich online zu treffen)!
      complete_congratulations: | # meeting_url
        Bravo an euch alle für eure Teilnahme! Ihr habt euch Zeit genommen, um zu teilen, zuzuhören und Verbindungen zu knüpfen: das ist schon ein schöner Erfolg 🧡

        Jetzt ist Zeit für die gemeinsame Begegnung! Per Video oder in echt, jetzt ist der Moment, euren Austausch zum Leben zu erwecken, den Worten Gesichter zu geben und diese guten Vibes weiterleben zu lassen 🤝

        Ein paar Ideen:

        Ein entspanntes Video-Treffen, jede*r bei sich zu Hause (Pyjama willkommen 😄)

        Ein Kaffee oder ein Apéro, wenn ihr nicht weit voneinander entfernt wohnt

        Ein Picknick oder eine gemeinsame Aktivität, wenn euch danach ist (und das Wetter mitspielt)

        Damit ihr euch leicht organisieren könnt, haben wir diesen Video-Link erstellt: %s
        Bringt eure Ideen ein, schlagt einen Moment vor, und vor allem... fühlt euch wie zu Hause ✨
      complete_j21: |
        Hallo zusammen! 👋

        Wir hoffen, euer Austausch lief gut, egal ob schriftlich, per Video oder in echt!
        Wenn ihr Rückmeldungen habt oder etwas nicht gut gelaufen ist, zögert bitte nicht, es uns zu sagen. Das Entourage-Team ist da, um euch zuzuhören und euch mit viel Wohlwollen zu begleiten 🧡

        Und wenn alles gut läuft, sagt uns das auch! Eure Rückmeldungen helfen uns, die Guten Vibes so passend wie möglich weiterzuentwickeln.

        Danke für euer Vertrauen ✨
      inactive_j3: |
        Hallo Team! Wir würden gerne wissen: Was hat euch dazu bewegt, dieser Gruppe beizutreten? 😊
      inactive_j5: |
        Ihr seid nicht so der Schreib-Typ? Kein Problem! Ihr könnt auch ein entspanntes Video-Treffen machen oder euch in kleiner Runde auf einen Kaffee treffen ☕

        Hier ist ein Link, um euch leicht online zu treffen:
        👉 %s

        Sagt uns gerne, was euch am besten passt, es gibt tausend Wege, um Verbindungen zu knüpfen 🧡
      inactive_j7: |
        Hier ist es gerade etwas ruhig…

        Wenn in den nächsten 7 Tagen keine Nachricht ausgetauscht wird, wird die Gruppe automatisch geschlossen.

        Danke, dass ihr dabei wart. Und falls ihr weiterhin Lust habt, Verbindungen zu knüpfen: die Guten Vibes heißen euch jederzeit wieder willkommen 🧡
      happy_birthday: | # first_name
        Die ganze Gute-Vibes-Gruppe wünscht %s alles Gute zum Geburtstag! 🎉 Genieß deinen Tag und erzähl uns gerne, wie du ihn feierst!
      chart_recall: |
        Eine wohlwollende kleine Erinnerung: Die Guten Vibes sind dazu da, in guter Stimmung und mit Respekt auszutauschen. Die Ethik-Charta findet ihr genau hier! Danke an euch alle!
      smalltalk_anniversary_six_months: |
        Unsere Gruppe feiert heute schon ihr sechsmonatiges Bestehen! 🎉 Danke für eure Gespräche und die schönen gemeinsamen Momente!
      smalltalk_anniversary_one_year: |
        Unsere Gruppe feiert heute schon ihr einjähriges Bestehen! 🎉 Danke für eure Gespräche und die schönen gemeinsamen Momente!
      user_one_year_membership: | # first_name
        Heute feiert %s sein/ihr 1-jähriges Jubiläum bei uns! 🎉 Danke, dass du schon so lange dabei bist, erzähl uns von einem besonderen Moment!
      smalltalk_500_messages: |
        Ihr seid in Feuerlaune! 🔥 500 Nachrichten wurden in der Gruppe schon ausgetauscht, hier wird ordentlich geplaudert! Machen wir so weiter? Nächstes Ziel: 1000 Nachrichten?
      smalltalk_1000_messages: |
        Unglaublich, ihr habt gerade 1000 ausgetauschte Nachrichten erreicht! 🤯 Ihr seid offiziell die Champions der Guten Vibes!

