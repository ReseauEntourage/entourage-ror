  onboarding:
    ethical_charter: |
      Ich bin's wieder!

      Bei Entourage liegt uns wirklich am Herzen, dass sich jede und jeder wohl, sicher, gehört und willkommen fühlt. Deshalb haben wir diese Ethik-Charta verfasst, zu deren Einhaltung sich alle Mitglieder der Community beim Beitritt zur App verpflichten. Lesen Sie sie hier:

      https://www.entourage.social/app/resources/eMU_InNSSJbE

      Bis ganz bald!

      %s

  outings:
    tasks:
      reminder_content: |
        Diese Veranstaltung rückt immer näher! Wenn Sie weiterhin teilnehmen möchten, kommentieren Sie bitte „Ich nehme teil" unter dieser Nachricht.
      reminder_7_days_with_participants: |
        Hallo %{first_name},

        Vielen Dank, dass Sie %{title} organisiert haben, das ist eine super Initiative, um Verbindungen zu schaffen! 🙌

        👉 Ich sehe, dass Ihre Veranstaltung näher rückt und sich bereits %{count} Personen angemeldet haben, das ist toll! Damit sie es nicht vergessen, können Sie ihnen eine kurze Nachricht in der Veranstaltungsdiskussion schreiben.

        Und wenn Sie möchten, dass sich weitere Nachbarn anmelden, empfehle ich Ihnen, den Link der Veranstaltung in Ihrer Gruppe %{neighborhood} zu teilen: das kann den entscheidenden Unterschied machen! Hier ist der Link: %{link}

        Wenn Sie Unterstützung brauchen, zögern Sie nicht, es mir zu sagen.

        Danke für Ihr Engagement und Ihren Wunsch, Verbindungen zu schaffen 🙏
        Bis bald
      reminder_7_days_without_participants: |
        Hallo %{first_name},

        Vielen Dank, dass Sie %{title} organisiert haben, das ist eine super Initiative, um Verbindungen zu schaffen! 🙌

        Ich sehe, dass Ihre Veranstaltung näher rückt, aber noch niemand hat sich angemeldet. Keine Sorge: oft bewegt sich erst in letzter Minute etwas 😉

        Ich empfehle Ihnen, den Link der Veranstaltung in Ihrer Gruppe %{neighborhood} zu teilen: das kann den entscheidenden Unterschied machen! Hier ist der Link: %{link}

        Wenn Sie Unterstützung brauchen, zögern Sie nicht, es mir zu sagen.

        Danke für Ihr Engagement und Ihren Wunsch, Verbindungen zu schaffen 🙏
        Bis bald
      reminder_1_day_with_participants: |
        Hallo %{first_name},

        Ihre Veranstaltung %{title} findet morgen statt!
        Ein großes Bravo für diese schöne Initiative 💪

        Hier ein paar einfache Tipps für einen geselligen und inklusiven Moment:

        🌟 Jede*n Teilnehmer*in persönlich mit einem kurzen Wort und einem Lächeln begrüßen
        🌟 Eine Vorstellungsaktivität starten (Eisbrecher-Spiele, Vorstellungsrunde usw.), um die Stimmung aufzulockern
        🌟 Auf jede*n achten: denen helfen, die sich zurückgezogen fühlen könnten, ihren Platz zu finden

        Zögern Sie am Ende der Veranstaltung nicht, ein Gruppenfoto zu machen (stellen Sie vorher sicher, dass alle Teilnehmenden einverstanden sind) und posten Sie es in Ihrer Nachbarschaftsgruppe %{neighborhood} 👌

        Danke für Ihr Engagement und Ihre Großzügigkeit. Sie tragen dazu bei, ein solidarischeres Viertel zu weben 💛

        Bis bald
      reminder_1_day_without_participants: |
        Hallo %{first_name},

        Ihre Veranstaltung %{title} findet morgen statt! Bravo für diese Initiative 👏

        Auch wenn sich bisher noch niemand angemeldet hat, ist nichts verloren: Nachbarn entscheiden sich manchmal erst in letzter Minute!

        Hier ein paar Ideen, um die Truppen zu motivieren:
        💬 Eine Nachricht in der Veranstaltungsdiskussion senden
        📣 Den Link in Ihrer Nachbarschaftsgruppe %{neighborhood} teilen
        🤝 Nachbarn, die Sie kennen oder mit denen Sie bereits ausgetauscht haben, direkt einladen

        Und falls Sie morgen letztendlich allein sind, ist das kein Misserfolg! Sie haben bereits das Schwierigste getan: aktiv zu werden, um Verbindungen zu schaffen 💛

        Danke für Ihr Engagement. Wir sind da, falls Sie Unterstützung brauchen 🙌

        Bis bald

