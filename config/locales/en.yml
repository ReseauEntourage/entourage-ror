  onboarding:
    ethical_charter: |
      It's me again!

      At Entourage, we really care about making sure everyone feels good, safe, heard, and welcomed. That's why we wrote this ethical charter, which all members of the community agree to respect when joining the app. Take a look here:

      https://www.entourage.social/app/resources/eMU_InNSSJbE

      See you soon!

      %s

  outings:
    tasks:
      reminder_content: |
        This event is coming up soon! If you're still interested in taking part, please comment "I'm participating" on this message.
      reminder_7_days_with_participants: |
        Hi %{first_name},

        Thank you so much for organizing %{title}, it's a great initiative for building connections! 🙌

        👉 I can see your event is coming up and %{count} people have already signed up, that's great! To help them remember, you could send them a short message in the event's discussion.

        And if you'd like more neighbors to sign up, I'd suggest sharing the event link in your %{neighborhood} group: it can really make a difference! Here's the link: %{link}

        If you need a hand with anything, don't hesitate to let me know.

        Thank you for your commitment and your desire to build connections 🙏
        See you soon
      reminder_7_days_without_participants: |
        Hi %{first_name},

        Thank you so much for organizing %{title}, it's a great initiative for building connections! 🙌

        I can see your event is coming up but no one has signed up yet. No need to worry: things often happen at the last minute 😉

        I'd suggest sharing the event link in your %{neighborhood} group: it can really make a difference! Here's the link: %{link}

        If you need a hand with anything, don't hesitate to let me know.

        Thank you for your commitment and your desire to build connections 🙏
        See you soon
      reminder_1_day_with_participants: |
        Hi %{first_name},

        Your event %{title} is happening tomorrow!
        Congratulations on this wonderful initiative 💪

        Here are a few simple tips to make it a friendly and inclusive moment:

        🌟 Welcome each participant personally with a kind word and a smile
        🌟 Start with an icebreaker (games, going around and sharing first names, etc.) to ease the mood
        🌟 Pay attention to everyone: help anyone who might feel left out find their place

        At the end of the event, feel free to take a group photo (making sure you have each participant's consent) and post it in your %{neighborhood} neighbors group 👌

        Thank you for your commitment and generosity. You're helping build a more caring neighborhood 💛

        See you soon
      reminder_1_day_without_participants: |
        Hi %{first_name},

        Your event %{title} is happening tomorrow! Well done for this initiative 👏

        Even though no one has signed up yet, all is not lost: neighbors sometimes decide at the last minute!

        Here are a few ideas to rally the troops:
        💬 Send a message in the event's discussion
        📣 Share the link in your %{neighborhood} neighbors group
        🤝 Directly invite neighbors you know or have already talked to

        And if you end up alone tomorrow, that's not a failure! You've already done the hardest part: taking action to build connections 💛

        Thank you for your commitment. We're here if you need a hand 🙌

        See you soon

