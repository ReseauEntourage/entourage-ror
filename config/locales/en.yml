  smalltalks:
    messager:
      new_member: | # first_name
        Welcome %s 🙂 We're thrilled to have you join us! Introduce yourself briefly so the group can get to know you.
      destroy_member: | # first_name
        %s has left the group. Thank you for your participation and best wishes!
      banned_member: | # first_name
        %s is no longer part of the group. Their behavior didn't quite match the spirit of these solidarity groups. We're counting on you to keep this space kind and good-humored 🙏
      incomplete: |
        We're preparing a lovely Good Vibes group ✨ While waiting for the next members, a little challenge: try to guess the name of the next person to join. Chances are slim... but who knows? 👀
      close: |
        All the members of this Good Vibes group have decided to leave the conversation, so you're now the only one left here. The group is now closed. You can still browse the conversation history and come back to it if needed.

        If you'd like to keep sharing Good Vibes, feel free to create a new request to join another group. See you soon 👋
      complete: |
        The group is complete! 🎉

        Welcome to your Good Vibes group, a space to connect simply and kindly ✨

        Your mission: chat, share, and maybe even meet up, via video or in real life?
        Here's the link for a first video call together: %s

        👋 Feel free to introduce yourself if you haven't already.

        🔥 And starting tomorrow... it's time for 7 days of little challenges to get to know each other and build real connections 🫶

        Let's all play along! 😉
      complete_j1: |
        Today's challenge: Three truths and a lie. Share three true facts about yourself and one false. Let others guess the lie!
      complete_j2: |
        Today's challenge: Yesterday in my life... Describe your day yesterday using only three emojis. Others must try to guess what happened!
      complete_j3: |
        Ask the group the most interesting question you've never found a satisfying answer to. Let's see if the group can help you think it through!
      complete_j4: |
        Today's challenge: Share something people wouldn't guess at first glance: a passion, a habit, a character trait...
      complete_j5: |
        Today's challenge: For 24 hours, a common word is banned in the group (e.g., "yes", "I", "eat"). If someone writes it... they must share a funny anecdote about themselves!
      complete_j6: |
        Today's challenge: Everyone shares what helps them approach someone: a look, a place, a phrase... or an anti-shyness tip!
      complete_j7: |
        Today's challenge: Share a fun upcoming event near you or online! If someone else mentions the same or a similar event, it might be the perfect time to go together (or meet online)!
      complete_congratulations: | # meeting_url
        Congratulations to everyone for taking part! You took the time to share, listen, and build connections: that's already a great success 🧡

        Now it's time for the group meetup! Whether by video or in person, it's the moment to bring your conversations to life, put faces to names, and keep these good vibes going 🤝

        A few ideas:

        A relaxed video call, everyone at home (pajamas welcome 😄)

        A coffee or drinks together if you don't live far from each other

        A picnic or a shared activity if you're up for it (and the weather cooperates)

        To make it easy to organize, we've created this video call link: %s
        Share your ideas, suggest a time, and above all... make yourselves at home ✨
      complete_j21: |
        Hello everyone! 👋

        We hope your exchanges went well, whether in writing, via video, or in person!
        If you have any feedback to share or if something didn't go well, please don't hesitate to tell us. The Entourage team is here to listen and support you, with kindness 🧡

        And if everything went well, let us know too! Your feedback helps us keep the Good Vibes going just right.

        Thank you for your trust ✨
      inactive_j3: |
        Hello team! We're curious to know what made you want to join this group? 😊
      inactive_j5: |
        Not super comfortable writing? No worries! You can also opt for a relaxed video call or a small coffee get-together ☕

        Here's a link so you can easily meet up online:
        👉 %s

        Feel free to say what would suit you best, there are a thousand ways to connect 🧡
      inactive_j7: |
        It feels a little quiet around here…

        If no messages are exchanged in the next 7 days, the group will close automatically.

        Thank you for being here. And if you ever feel like connecting again, Good Vibes will be happy to welcome you back, whenever you like 🧡
      happy_birthday: | # first_name
        The entire Good Vibes crew wishes %s a happy birthday! 🎉 Enjoy your day and feel free to tell us how you're celebrating!
      chart_recall: |
        A gentle reminder: Good Vibes is all about friendly, respectful exchanges. You'll find the ethical charter right here! Thank you all!
      smalltalk_anniversary_six_months: |
        Our group is already celebrating its six-month anniversary today! 🎉 Thank you for your exchanges and good times together!
      smalltalk_anniversary_one_year: |
        Our group is already celebrating its one-year anniversary today! 🎉 Thank you for your exchanges and good times together!
      user_one_year_membership: | # first_name
        Today, %s celebrates 1 year with us! 🎉 Thank you for being with us all this time, tell us about a memorable moment!
      smalltalk_500_messages: |
        You're on fire! 🔥 500 messages already exchanged in the group, lots of chatting going on here! Shall we keep it up? Next goal: 1000 messages?
      smalltalk_1000_messages: |
        Incredible, you've just reached 1000 messages exchanged! 🤯 You're officially the chat champions!

