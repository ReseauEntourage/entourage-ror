  smalltalks:
    messager:
      new_member: | # first_name
        مرحبًا %s 🙂 سعداء بانضمامك إلينا! قدم نفسك ببضع كلمات حتى يتعرف عليك باقي الأعضاء.
      destroy_member: | # first_name
        %s غادر المجموعة. شكرًا لمشاركتك ونتمنى لك التوفيق!
      banned_member: | # first_name
        %s لم يعد ضمن المجموعة. سلوكه لم يكن مناسبًا مع روح التضامن في مجموعتنا. نعتمد عليكم للحفاظ على هذا الفضاء بروح طيبة وبابتسامة دائمة 🙏
      incomplete: |
        نحضر لكم مجموعة جميلة من الطاقات الإيجابية ✨ في انتظار انضمام الأعضاء الجدد، تحدٍ صغير: حاولوا تخمين اسم العضو أو العضوة القادمة. الاحتمال ضعيف... لكن من يدري؟ 👀
      complete: |
        المجموعة أصبحت مكتملة! 🎉

        مرحبًا بكم في مجموعة الطاقات الإيجابية، فضاء للتواصل البسيط واللطيف ✨

        مهمتكم: التبادل، المشاركة، وربما اللقاء، سواء عبر الفيديو أو على أرض الواقع؟
        هذا هو رابط أول لقاء بالفيديو: [Lien meet] Lien meet

        👋 لا تترددوا في تقديم أنفسكم إن لم تفعلوا ذلك بعد.

        🔥 وابتداءً من الغد... تبدأ التحديات اليومية لمدة 7 أيام للتعارف وبناء روابط حقيقية 🫶

        نعتمد عليكم لتلعبوا اللعبة بكل حماس 😉
      complete_j1: |
        تحدي اليوم: ثلاث حقائق وكذبة: شارك ثلاث حقائق عنك وكذبة واحدة. على الآخرين أن يخمنوا الكذبة!
      complete_j2: |
        تحدي اليوم: "يومي اليوم..." احكِ عن يومك باستخدام ثلاثة إيموجي فقط. وعلى الآخرين محاولة تخمين ما حدث!
      complete_j3: |
        اطرحوا على المجموعة أكثر سؤال محيّر لم تجدوا له إجابة مُرضية من قبل. ربما يساعدكم أحد في التفكير!
      complete_j4: |
        تحدي اليوم: شاركوا شيئًا لا يلاحظه الناس من أول نظرة: هواية، عادة، أو صفة شخصية...
      complete_j5: |
        تحدي اليوم: لمدة 24 ساعة، يُمنع استخدام كلمة شائعة في المجموعة (مثل: "نعم"، "أنا"، "أكل"). من يستخدمها... عليه أن يروي قصة طريفة عن نفسه!
      complete_j6: |
        تحدي اليوم: شاركوا ما يساعدكم على بدء الحديث مع الآخرين: نظرة، مكان، عبارة... أو نصيحة للتغلب على الخجل!
      complete_j7: |
        تحدي اليوم: شاركوا فعالية ممتعة قادمة في منطقتكم أو على الإنترنت! إذا ذكر أحد فعالية مشابهة، فقد تكون فرصة للذهاب معًا (أو اللقاء افتراضيًا)!
      complete_congratulations: | # meeting_url
        تهانينا على مشاركتكم! لقد خصصتم وقتًا للتبادل، والاستماع، وبناء علاقات: وهذا بحد ذاته إنجاز رائع 🧡

        الآن، حان وقت اللقاء الجماعي! سواء عبر الفيديو أو في الواقع، حان وقت إعطاء الحياة لحديثكم، ورؤية الوجوه خلف الكلمات، وجعل هذه الطاقات الإيجابية تستمر 🤝

        بعض الأفكار:

        لقاء فيديو هادئ من المنزل (البيجامة مرحب بها 😄)

        قهوة أو جلسة غير رسمية إذا كنتم قريبين من بعض

        نزهة أو نشاط مشترك إذا كنتم ترغبون بذلك (وإذا سمح الطقس)

        لتسهيل التنظيم، إليكم رابط اللقاء: %s
        شاركوا اقتراحاتكم، واقترحوا وقتًا، والأهم... تصرفوا وكأنكم في بيتكم ✨
      complete_j21: |
        مرحبًا بالجميع! 👋

        نأمل أن تكون محادثاتكم قد مرت بشكل جيد، سواء كتابةً أو عبر الفيديو أو في الواقع!
        إذا كان لديكم أي ملاحظات أو إذا حصل شيء لم يعجبكم، لا تترددوا أبدًا في إخبارنا. فريق Entourage هنا للاستماع والدعم بكل لطف 🧡

        وإذا كان كل شيء على ما يرام، أخبرونا بذلك أيضًا! ملاحظاتكم تساعدنا على تحسين تجربة Bonnes Ondes.

        شكرًا لثقتكم ✨
      inactive_j3: |
        مرحبًا يا فريق! نود أن نعرف، ما الذي دفعكم للانضمام إلى هذه المجموعة؟
      inactive_j5: |
        لا تشعر بالراحة في الكتابة؟ لا مشكلة! يمكنك دائمًا اختيار لقاء فيديو هادئ أو قهوة مع مجموعة صغيرة. أخبرنا بما يناسبك!
      inactive_j7: |
        المجموعة هادئة هذه الأيام... إذا لم نتلقّ أي جديد خلال 7 أيام، سنغلق المجموعة بهدوء. شكرًا لكم على وجودكم، ومن يدري... إلى لقاء آخر!
      happy_birthday: | # first_name
        كل مجموعة Papotage تتمنى عيد ميلاد سعيد لـ %s! 🎉 استمتع بيومك، ولا تتردد في إخبارنا كيف ستحتفل!
      chart_recall: |
        تذكير لطيف: Papotage هو مكان للتبادل بروح مرحة ومحترمة. يمكنكم العثور على الميثاق الأخلاقي هنا! شكرًا للجميع!
      smalltalk_anniversary_six_months: |
        مجموعتنا تحتفل اليوم بمرور ستة أشهر! 🎉 شكرًا على مشاركاتكم ولحظاتكم الجميلة معًا!
      smalltalk_anniversary_one_year: |
        مجموعتنا تحتفل اليوم بعامها الأول! 🎉 شكرًا على مشاركاتكم ولحظاتكم الجميلة معًا!
      user_one_year_membership: | # first_name
        اليوم، %s يحتفل بمرور عام على انضمامه لنا! 🎉 شكرًا لوجودك معنا طوال هذا الوقت، احكِ لنا عن لحظة لا تُنسى!
      smalltalk_500_messages: |
        أنتم مذهلون! 🔥 500 رسالة تم تبادلها في المجموعة، الحديث لا يتوقف هنا! نتابع؟ الهدف القادم: 1000 رسالة؟
      smalltalk_1000_messages: |
        مذهل، لقد وصلتم إلى 1000 رسالة متبادلة! 🤯 أنتم أبطال Papotage بلا منازع!

