  onboarding:
    ethical_charter: |
      إنه أنا مجدداً!

      في Entourage، نهتم فعلاً بأن يشعر الجميع بالأمان، وأن يتم الاستماع إليهم، وأن يكونوا مُرحب بهم. لذلك كتبنا هذا الميثاق الأخلاقي الذي يجب أن يتم قراءته وقبوله من قبل جميع أعضاء المجتمع: https://www.entourage.social/app/resources/eMU_InNSSJbE 📜.

      أنا مكلفة بمراقبة احترام هذا الميثاق على التطبيق وأثناء الفعاليات التي تنظمها الجمعية، حتى تبقى الشبكة آمنة ومرحبة بالجميع. على المجتمع بأكمله أن يضمن هذا! نعتمد عليكم 💪

      أراكم قريباً!

