      incomplete: "Ми готуємо чудову групу Добрих Вібрацій ✨ Поки чекаємо на наступних учасників, невеликий виклик: спробуйте вгадати ім'я наступного, хто приєднається. Шанси вгадати малі... але хто знає? 👀"
      complete: |
        Група укомплектована! 🎉

        Ласкаво просимо до вашої групи добрих вібрацій, простору для простого та доброзичливого спілкування ✨

        Ваше завдання: спілкуватися, ділитися, а можливо, навіть зустрітися, у відеочаті або в реальному житті?
        Ось посилання на перший спільний відеочат: [Посилання на зустріч] Посилання на зустріч

        👋 Не соромтеся представитися, якщо ще не зробили цього.

        🔥 І вже завтра... починається 7 днів невеликих викликів, щоб пізнати одне одного та створити справжні зв'язки 🫶

        Розраховуємо на вашу активну участь! 😉
      complete_j1: "Виклик дня: Три правди та одна брехня. Поділіться трьома правдивими фактами про себе та одним неправдивим. Нехай інші вгадають, що є брехнею!"
      complete_j2: "Виклик дня: Сьогодні в моєму житті... Опишіть свій день лише трьома емодзі. Інші повинні спробувати вгадати, що сталося!"
      complete_j3: "Задайте групі найцікавіше питання, на яке ви ніколи не знаходили задовільної відповіді. Подивимося, чи зможе група допомогти вам у роздумах!"
      complete_j4: "Виклик дня: Поділіться чимось, що люди не здогадаються з першого погляду: захопленням, звичкою, рисою характеру..."
      complete_j5: "Виклик дня: Протягом 24 годин одне поширене слово заборонено в групі (наприклад: \"так\", \"я\", \"їсти\"). Якщо хтось його напише... він повинен розповісти смішну історію про себе!"
      complete_j6: "Виклик дня: Поділіться тим, що допомагає вам підійти до когось: поглядом, місцем, фразою... або порадою проти сором'язливості!"
      complete_j7: "Виклик дня: Поділіться цікавим майбутнім заходом поблизу вас або онлайн! Якщо хтось інший згадає той самий або подібний захід, можливо, це ідеальний момент, щоб піти разом (або зустрітися онлайн)!"
      complete_congratulations: |
        Вітаємо всіх з участю! Ви знайшли час поділитися, слухати та створювати зв'язки: це вже великий успіх 🧡

        Тепер настав час для спільної зустрічі! У відеочаті або в реальному житті, це момент, щоб оживити ваші обміни, побачити обличчя за словами та продовжити ці добрі вібрації 🤝

        Деякі ідеї:

        - Розслаблений відеочат, кожен у себе вдома (піжама вітається 😄)

        - Кава або аперитив, якщо ви живете недалеко один від одного

        - Пікнік або спільна діяльність, якщо бажаєте (і погода дозволяє)

        Щоб легко організуватися, ми створили це посилання на відеочат: %s
        Запропонуйте свої ідеї, запропонуйте час, і перш за все... почувайтеся як вдома ✨
      complete_j21: |
        Привіт всім! 👋

        Сподіваємося, ваші обміни пройшли добре, будь то письмово, у відеочаті або в реальному житті!
        Якщо у вас є відгуки або щось пішло не так, не соромтеся повідомити нам. Команда Entourage тут, щоб вас вислухати та підтримати з доброзичливістю 🧡

        І якщо все добре, повідомте нам також! Ваші відгуки допомагають нам продовжувати робити Добрі Вібрації ще кращими.

        Дякуємо за вашу довіру ✨
      inactive_j3: "Привіт, команда! Нам цікаво дізнатися, що спонукало вас приєднатися до цієї групи?"
      inactive_j5: "Не дуже комфортно писати? Немає проблем! Ви також можете вибрати розслаблений відеочат або каву в невеликій компанії. Повідомте нам, що вам більше підходить!"
      inactive_j7: "Група зараз тиха... Якщо ми не отримаємо новин протягом 7 днів, ми спокійно закриємо групу. Дякуємо, що були з нами, і хто знає... до зустрічі десь!"
      happy_birthday: "Вся команда Papotage бажає %s щасливого дня народження! 🎉 Насолоджуйтесь своїм днем і не соромтеся розповісти нам, як ви будете святкувати!"
      chart_recall: "Дружнє нагадування: Papotage створено для обміну з гарним настроєм та повагою. Ви знайдете етичний кодекс тут! Дякуємо всім!"
      smalltalk_anniversary_six_months: "Нашій групі вже шість місяців! 🎉 Дякуємо за ваші обміни та приємні моменти разом!"
      smalltalk_anniversary_one_year: "Нашій групі вже рік! 🎉 Дякуємо за ваші обміни та приємні моменти разом!"
      user_one_year_membership: "Сьогодні %s святкує 1 рік з нами! 🎉 Дякуємо, що були з нами весь цей час, поділіться з нами пам'ятним моментом!"
      smalltalk_500_messages: "Ви на вогні! 🔥 Вже обмінялися 500 повідомленнями в групі, тут активно спілкуються! Продовжимо в тому ж дусі? Наступна мета: 1000 повідомлень?"
      smalltalk_1000_messages: "Неймовірно, ви щойно досягли 1000 обміняних повідомлень! 🤯 Ви офіційно чемпіони спілкування!"

