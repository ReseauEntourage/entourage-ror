  onboarding:
    ethical_charter: |
      Це знову я!

      В Entourage нам дійсно важливо, щоб кожен почувався у безпеці, почутим та бажаним. Саме тому ми написали цей етичний кодекс, який повинен бути прочитаний і прийнятий усіма членами спільноти: https://www.entourage.social/app/resources/eMU_InNSSJbE 📜.

      Я відповідаю за дотримання цього кодексу у додатку та під час заходів, організованих асоціацією, щоб мережа залишалася безпечною та доброзичливою для всіх. Уся спільнота повинна дбати про це! Ми розраховуємо на вас 💪

