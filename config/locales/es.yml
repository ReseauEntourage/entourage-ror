  smalltalks:
    messager:
      new_member: | # first_name
        ¡Bienvenido/a %s! 🙂 Nos alegra mucho que te unas a nosotros. Preséntate en pocas palabras para que el grupo pueda conocerte.
      destroy_member: | # first_name
        %s acaba de salir del grupo. Gracias por tu participación, ¡te deseamos lo mejor!
      banned_member: | # first_name
        %s ya no forma parte del grupo. Su comportamiento no encajaba del todo con el espíritu de las bandas solidarias. Contamos con ustedes para seguir cuidando este espacio con amabilidad y buen humor 🙏
      incomplete: |
        Te estamos preparando un bonito grupo de Buenas Vibras ✨ Mientras llegan las próximas personas, un pequeño reto: intenta adivinar el nombre de quien se unirá a continuación. Las probabilidades de acertar son escasas... ¿pero quién sabe? 👀
      close: |
        Todos los miembros de este grupo de Buenas Vibras han decidido abandonar la conversación, así que te has quedado solo/a aquí. El grupo está ahora cerrado. Siempre puedes consultar el historial de la conversación y volver si lo necesitas.

        Si quieres seguir compartiendo Buenas Vibras, no dudes en crear una nueva solicitud para unirte a otro grupo. ¡Hasta pronto! 👋
      complete: |
        ¡El grupo está al completo! 🎉

        Bienvenidos a su grupo de Buenas Vibras, un espacio para crear vínculos de forma sencilla y con calidez ✨

        Su misión: charlar, compartir y, ¿por qué no?, conocerse, por videollamada o en persona.
        Aquí tienen el enlace para una primera videollamada juntos: %s

        👋 No duden en presentarse si todavía no lo han hecho.

        🔥 Y a partir de mañana... comienzan 7 días de pequeños retos para conocerse y crear vínculos de verdad 🫶

        ¡Contamos con ustedes para jugar a fondo! 😉
      complete_j1: |
        Reto del día: Tres verdades y una mentira: comparte tres datos ciertos sobre ti y uno falso. ¡Que los demás adivinen cuál es el intruso!
      complete_j2: |
        Reto del día: Ayer en mi vida... Cuenta tu día de ayer con solo tres emojis. ¡Los demás deben intentar adivinar qué pasó!
      complete_j3: |
        Hazle al grupo la pregunta más interesante para la que nunca has encontrado una respuesta satisfactoria. ¡Veamos si el grupo puede ayudarte a reflexionar sobre ella!
      complete_j4: |
        Reto del día: Comparte algo que la gente no adivinaría a primera vista: una pasión, una costumbre, un rasgo de tu carácter...
      complete_j5: |
        Reto del día: Durante 24 horas, una palabra común está prohibida en el grupo (por ejemplo: "sí", "yo", "comer"). Si alguien la escribe... ¡tiene que contar una anécdota graciosa sobre sí mismo!
      complete_j6: |
        Reto del día: Cada uno comparte lo que le ayuda a acercarse a alguien: una mirada, un lugar, una frase... ¡o un truco anti-timidez!
      complete_j7: |
        Reto del día: Comparte un evento chulo que se acerque cerca de ti o en línea. Si alguien más menciona el mismo evento o uno parecido, ¡quizá sea el momento perfecto para ir juntos (o encontraros en línea)!
      complete_congratulations: | # meeting_url
        ¡Felicidades a todos por su participación! Se tomaron el tiempo de compartir, escuchar y crear vínculos: eso ya es un gran logro 🧡

        ¡Ahora, es momento del encuentro en grupo! Por videollamada o en persona, es el momento de darle vida a sus conversaciones, ponerle cara a los nombres y mantener vivas estas Buenas Vibras 🤝

        Algunas ideas:

        Una videollamada tranquila, cada uno desde su casa (¡pijama bienvenido 😄!)

        Un café o algo para tomar si no viven lejos unos de otros

        Un picnic o una actividad en común si el cuerpo (y el clima) lo permite

        Para organizarse fácilmente, creamos este enlace de videollamada: %s
        Propongan sus ideas, sugieran un momento y, sobre todo... siéntanse como en casa ✨
      complete_j21: |
        ¡Hola a todos! 👋

        Esperamos que sus conversaciones hayan ido bien, ya sea por escrito, en videollamada o en persona.
        Si tienen comentarios que compartir o si algo no salió bien, no duden en decírnoslo. El equipo de Entourage está aquí para escucharlos y acompañarlos, con toda la calidez del mundo 🧡

        Y si todo va bien, ¡cuéntennoslo también! Sus comentarios nos ayudan a seguir haciendo que las Buenas Vibras funcionen lo mejor posible.

        Gracias por su confianza ✨
      inactive_j3: |
        ¡Hola equipo! 👋 Tenemos curiosidad por saber qué los animó a unirse a este grupo 😊
      inactive_j5: |
        ¿No se sienten muy cómodos escribiendo? ¡No hay problema! También pueden optar por una videollamada tranquila o un café en petit comité ☕

        Aquí tienen un enlace para verse fácilmente en línea:
        👉 %s

        No duden en decirnos qué les vendría mejor, ¡hay mil formas de crear vínculos! 🧡
      inactive_j7: |
        Sentimos que está un poco tranquilo por aquí...

        Si no se intercambia ningún mensaje en los próximos 7 días, el grupo se cerrará automáticamente.

        Gracias por haber estado aquí. Y si todavía tienen ganas de crear vínculos, las Buenas Vibras los recibirán de nuevo cuando quieran 🧡
      happy_birthday: | # first_name
        ¡Todo el grupo de Buenas Vibras le desea un feliz cumpleaños a %s! 🎉 Disfruta mucho de tu día y no dudes en contarnos cómo lo vas a celebrar.
      chart_recall: |
        Un pequeño recordatorio con cariño: las Buenas Vibras están para conversar con buen humor y respeto. Aquí tienen la carta ética. ¡Gracias a todos y todas!
      smalltalk_anniversary_six_months: |
        ¡Hoy nuestro grupo cumple ya seis meses! 🎉 Gracias por sus conversaciones y los buenos momentos compartidos.
      smalltalk_anniversary_one_year: |
        ¡Hoy nuestro grupo cumple ya un año! 🎉 Gracias por sus conversaciones y los buenos momentos compartidos.
      user_one_year_membership: | # first_name
        ¡Hoy, %s celebra 1 año con nosotros! 🎉 Gracias por estar con nosotros todo este tiempo, ¡cuéntanos un momento que recuerdes especialmente!
      smalltalk_500_messages: |
        ¡Están que arden! 🔥 Ya se han intercambiado 500 mensajes en el grupo, ¡aquí se conversa en serio! ¿Seguimos así? ¿Próximo objetivo: 1000 mensajes?
      smalltalk_1000_messages: |
        ¡Increíble, acaban de alcanzar los 1000 mensajes intercambiados! 🤯 ¡Son oficialmente los campeones de las Buenas Vibras!

