  onboarding:
    ethical_charter: |
      ¡Soy yo otra vez!

      En Entourage, nos importa mucho que cada persona se sienta bien, segura, escuchada y bienvenida. Por eso hemos redactado esta carta ética, que todos los miembros de la comunidad se comprometen a respetar al unirse a la aplicación. Puedes consultarla aquí:

      https://www.entourage.social/app/resources/eMU_InNSSJbE

      ¡Hasta muy pronto!

      %s

  outings:
    tasks:
      reminder_content: |
        ¡Este evento se acerca a toda velocidad! Si todavía te interesa participar, coméntanos "Voy a participar" en los comentarios de este mensaje.
      reminder_7_days_with_participants: |
        Hola %{first_name},

        Muchas gracias por organizar %{title}, ¡es una iniciativa genial para crear vínculos! 🙌

        👉 Veo que tu evento se acerca y ya se han inscrito %{count} personas, ¡genial! Para ayudarles a no olvidarlo, puedes escribirles un pequeño mensaje en la conversación del evento.

        Y si quieres que se inscriban más vecinos, te recomiendo compartir el enlace del evento en tu grupo de %{neighborhood}: ¡puede marcar la diferencia! Aquí tienes el enlace: %{link}

        Si necesitas una mano, no dudes en decírmelo.

        Gracias por tu compromiso y tus ganas de crear vínculos 🙏
        Hasta muy pronto
      reminder_7_days_without_participants: |
        Hola %{first_name},

        Muchas gracias por organizar %{title}, ¡es una iniciativa genial para crear vínculos! 🙌

        Veo que tu evento se acerca pero todavía nadie se ha inscrito. Sin pánico: muchas veces la gente se anima en el último momento 😉

        Te recomiendo compartir el enlace del evento en tu grupo de %{neighborhood}: ¡puede marcar la diferencia! Aquí tienes el enlace: %{link}

        Si necesitas una mano, no dudes en decírmelo.

        Gracias por tu compromiso y tus ganas de crear vínculos 🙏
        Hasta muy pronto
      reminder_1_day_with_participants: |
        Hola %{first_name},

        ¡Tu evento %{title} es mañana!
        ¡Enhorabuena por esta bonita iniciativa! 💪

        Aquí tienes algunos consejos sencillos para crear un momento agradable e inclusivo:

        🌟 Recibir a cada participante personalmente con una palabra amable y una sonrisa
        🌟 Empezar con una actividad de presentación (juegos para romper el hielo, ronda de nombres, etc.) para relajar el ambiente
        🌟 Estar atento/a a cada persona: ayudar a quienes puedan sentirse un poco apartados a encontrar su lugar

        Al final del evento, no dudes en hacer una foto de grupo (asegurándote de tener el permiso de cada participante) y publicarla en tu grupo de vecinos %{neighborhood} 👌

        Gracias por tu compromiso y tu generosidad. Estás ayudando a tejer un barrio más solidario 💛

        Hasta muy pronto
      reminder_1_day_without_participants: |
        Hola %{first_name},

        ¡Tu evento %{title} es mañana! Enhorabuena por esta iniciativa 👏

        Aunque todavía nadie se ha inscrito, no todo está perdido: ¡a veces los vecinos se deciden en el último momento!

        Aquí tienes algunas ideas para animar a la gente:
        💬 Enviar un mensaje en la conversación del evento
        📣 Compartir el enlace en tu grupo de vecinos %{neighborhood}
        🤝 Invitar directamente a vecinos que conozcas o con quienes ya hayas hablado

        Y si al final te quedas solo/a mañana, ¡no es un fracaso! Ya has hecho lo más difícil: dar el paso para crear vínculos 💛

        Gracias por tu compromiso. Aquí estamos si necesitas una mano 🙌

        Hasta muy pronto

