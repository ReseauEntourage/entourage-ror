  onboarding:
    ethical_charter: |
      To znowu ja!

      W Entourage naprawdę zależy nam na tym, aby każdy czuł się dobrze, bezpiecznie, wysłuchany i mile widziany. Dlatego napisaliśmy tę kartę etyczną, do przestrzegania której zobowiązuje się każdy członek społeczności dołączający do aplikacji. Zapoznaj się z nią tutaj:

      https://www.entourage.social/app/resources/eMU_InNSSJbE

      Do zobaczenia wkrótce!

      %s
  outings:
    tasks:
      reminder_content: 'To wydarzenie zbliża się wielkimi krokami! Jeśli nadal jesteś zainteresowany(a) udziałem, napisz w komentarzu do tej wiadomości „Biorę udział”.

        '
      reminder_7_days_with_participants: "Cześć %{first_name},\n\nBardzo dziękujemy za zorganizowanie %{title}, to świetna inicjatywa, by tworzyć więzi! \U0001F64C\n\n\U0001F449 Widzę, że Twoje wydarzenie się zbliża i %{count} osób już się zapisało, super! Aby pomóc im o tym nie zapomnieć, możesz napisać do nich krótką wiadomość w dyskusji wydarzenia.\n\nA jeśli chcesz, żeby zapisało się więcej sąsiadów, radzę udostępnić link do wydarzenia w Twojej grupie %{neighborhood}: to może zrobić dużą różnicę! Oto link: %{link}\n\nJeśli potrzebujesz wsparcia, śmiało daj mi znać.\n\nDziękujemy za Twoje zaangażowanie i chęć tworzenia więzi \U0001F64F\nDo zobaczenia wkrótce\n"
      reminder_7_days_without_participants: "Cześć %{first_name},\n\nBardzo dziękujemy za zorganizowanie %{title}, to świetna inicjatywa, by tworzyć więzi! \U0001F64C\n\nWidzę, że Twoje wydarzenie się zbliża, ale nikt jeszcze się nie zapisał. Bez obaw: często wszystko dzieje się w ostatniej chwili \U0001F609\n\nRadzę udostępnić link do wydarzenia w Twojej grupie %{neighborhood}: to może zrobić dużą różnicę! Oto link: %{link}\n\nJeśli potrzebujesz wsparcia, śmiało daj mi znać.\n\nDziękujemy za Twoje zaangażowanie i chęć tworzenia więzi \U0001F64F\nDo zobaczenia wkrótce\n"
      reminder_1_day_with_participants: "Cześć %{first_name},\n\nTwoje wydarzenie %{title} odbywa się jutro!\nWielkie brawa za tę piękną inicjatywę \U0001F4AA\n\nOto kilka prostych wskazówek, jak stworzyć przyjazną i integrującą atmosferę:\n\n\U0001F31F Przywitaj każdego uczestnika(-czkę) osobiście, z uśmiechem i miłym słowem\n\U0001F31F Zacznij od aktywności integracyjnej (gra na przełamanie lodów, runda imion itp.), żeby rozluźnić atmosferę\n\U0001F31F Bądź uważny(a) na każdą osobę: pomóż tym, którzy mogą czuć się z boku, znaleźć swoje miejsce\n\nNa koniec wydarzenia śmiało zrób zdjęcie grupowe (upewniając się, że masz zgodę każdego uczestnika) i opublikuj je w Twojej grupie sąsiedzkiej %{neighborhood} \U0001F44C\n\nDziękujemy za Twoje zaangażowanie i hojność. Pomagasz budować bardziej solidarną okolicę \U0001F49B\n\nDo zobaczenia wkrótce\n"
      reminder_1_day_without_participants: "Cześć %{first_name},\n\nTwoje wydarzenie %{title} odbywa się jutro! Brawo za tę inicjatywę \U0001F44F\n\nNawet jeśli nikt jeszcze się nie zapisał, nic straconego: sąsiedzi czasem decydują się w ostatniej chwili!\n\nOto kilka pomysłów, jak zmobilizować ekipę:\n\U0001F4AC Wyślij wiadomość w dyskusji wydarzenia\n\U0001F4E3 Udostępnij link w Twojej grupie sąsiedzkiej %{neighborhood}\n\U0001F91D Zaproś bezpośrednio sąsiadów, których znasz lub z którymi już rozmawiałeś(-aś)\n\nA jeśli ostatecznie zostaniesz sam(a) jutro, to nie porażka! Zrobiłeś(-aś) już to, co najtrudniejsze: podjąłeś(-ęłaś) działanie, by tworzyć więzi \U0001F49B\n\nDziękujemy za Twoje zaangażowanie. Jesteśmy tu, jeśli potrzebujesz pomocnej dłoni \U0001F64C\n\nDo zobaczenia wkrótce\n"
