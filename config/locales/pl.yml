      alone: Ty
  smalltalks:
    messager:
      new_member: "Witamy %s \U0001F642 Cieszymy się, że do nas dołączyłeś! Przedstaw się w kilku słowach, aby grupa mogła Cię lepiej poznać.\n"
      destroy_member: "%s opuścił(a) grupę. Dziękujemy za udział i życzymy Ci powodzenia!\n"
      banned_member: "%s nie jest już członkiem grupy. Jego zachowanie nie odpowiadało duchowi solidarności naszej społeczności. Liczymy na Was, że nadal będziecie tworzyć to miejsce z życzliwością i dobrą energią \U0001F64F\n"
      incomplete: "Przygotowujemy dla Was wspaniałą grupę Dobrych Wibracji ✨ W oczekiwaniu na kolejne osoby, małe wyzwanie: spróbujcie zgadnąć imię następnego uczestnika. Szanse są niewielkie... ale kto wie? \U0001F440\n"
      close: "Wszyscy członkowie tej grupy Dobrych Wibracji zdecydowali się opuścić rozmowę, więc zostałeś(-aś) tu sam(a). Grupa jest teraz zamknięta. Możesz nadal przeglądać historię rozmów i wrócić do niej w razie potrzeby.\n\nJeśli chcesz kontynuować dzielenie się Dobrymi Wibracjami, śmiało złóż nową prośbę o dołączenie do innej grupy. Do zobaczenia \U0001F44B\n"
      complete: "Grupa jest kompletna! \U0001F389\n\nWitamy w Waszej grupie Dobrych Wibracji, przestrzeni do nawiązywania relacji w prosty i życzliwy sposób ✨\n\nWasza misja: rozmawiać, dzielić się i może nawet spotkać się – online lub na żywo?\nOto link do pierwszego wspólnego spotkania wideo: %s\n\n\U0001F44B Nie wahajcie się przedstawić, jeśli jeszcze tego nie zrobiliście.\n\n\U0001F525 A już od jutra... zaczynamy 7 dni małych wyzwań, aby lepiej się poznać i zbudować prawdziwe więzi \U0001FAF6\n\nLiczymy na Wasze pełne zaangażowanie! \U0001F609\n"
      complete_j1: 'Dzisiejsze wyzwanie: Trzy prawdy, jedno kłamstwo – podziel się trzema prawdziwymi faktami o sobie i jednym fałszywym. Reszta grupy musi zgadnąć, który to blef!

        '
      complete_j2: 'Dzisiejsze wyzwanie: Mój dzień w trzech emoji – opisz swój dzień używając tylko trzech emoji. Pozostali spróbują odgadnąć, co się wydarzyło!

        '
      complete_j3: 'Zadaj grupie najciekawsze pytanie, na które nigdy nie znalazłeś satysfakcjonującej odpowiedzi. Zobaczmy, czy grupa może Ci pomóc w przemyśleniach!

        '
      complete_j4: 'Dzisiejsze wyzwanie: Podziel się czymś, czego ludzie nie domyślają się na pierwszy rzut oka – pasją, nawykiem, cechą charakteru...

        '
      complete_j5: 'Dzisiejsze wyzwanie: Przez 24 godziny jedno powszechne słowo jest zakazane w grupie (np. "tak", "ja", "jeść"). Jeśli ktoś je napisze... musi opowiedzieć zabawną anegdotę o sobie!

        '
      complete_j6: 'Dzisiejsze wyzwanie: Każdy dzieli się tym, co pomaga mu nawiązać kontakt z innymi – spojrzenie, miejsce, zdanie... lub trik na przezwyciężenie nieśmiałości!

        '
      complete_j7: 'Dzisiejsze wyzwanie: Podziel się nadchodzącym wydarzeniem w Twojej okolicy lub online! Jeśli ktoś inny wspomni o tym samym lub podobnym wydarzeniu, to może idealny moment, aby wybrać się razem (lub spotkać się online)!

        '
      complete_congratulations: "Gratulacje dla wszystkich za udział! Poświęciliście czas na dzielenie się, słuchanie i budowanie więzi – to już wielki sukces \U0001F9E1\n\nTeraz czas na wspólne spotkanie! Online lub na żywo, to moment, aby ożywić Wasze rozmowy, zobaczyć się nawzajem i utrwalić te dobre wibracje \U0001F91D\n\nKilka pomysłów:\n\nSpokojne spotkanie wideo, każdy u siebie (piżama mile widziana \U0001F604)\n\nKawa lub aperitif, jeśli mieszkacie blisko siebie\n\nPiknik lub wspólna aktywność, jeśli macie ochotę (i pogoda dopisze)\n\nAby łatwo się zorganizować, stworzyliśmy ten link do spotkania wideo: %s\nPodzielcie się pomysłami, zaproponujcie termin i przede wszystkim... czujcie się jak u siebie ✨\n"
      complete_j21: "Witajcie wszyscy! \U0001F44B\n\nMamy nadzieję, że Wasze rozmowy przebiegły pomyślnie, czy to pisemnie, wideo czy na żywo!\nJeśli macie uwagi lub coś poszło nie tak, nie wahajcie się nam powiedzieć. Zespół Entourage jest tutaj, aby Was wysłuchać i wspierać z życzliwością \U0001F9E1\n\nA jeśli wszystko jest w porządku, dajcie nam znać! Wasze opinie pomagają nam dalej rozwijać Dobre Wibracje jak najlepiej.\n\nDziękujemy za zaufanie ✨\n"
      inactive_j3: "Hej, ekipo! Jesteśmy ciekawi, co skłoniło Was do dołączenia do tej grupy? \U0001F60A\n"
      inactive_j5: "Nie czujesz się swobodnie w pisaniu? Żaden problem! Możesz też wybrać spokojną rozmowę wideo lub kawę w małym gronie ☕\n\nOto link, dzięki któremu łatwo się odnajdziecie online:\n\U0001F449 %s\n\nŚmiało powiedz, co odpowiadałoby Ci najbardziej, jest tysiąc sposobów na budowanie więzi \U0001F9E1\n"
      inactive_j7: "Czujemy, że jest tu trochę cicho…\n\nJeśli w ciągu najbliższych 7 dni nie pojawi się żadna wiadomość, grupa zostanie automatycznie zamknięta.\n\nDziękujemy, że byliście z nami. A jeśli nadal macie ochotę tworzyć więzi, Dobre Wibracje przyjmą Was ponownie, kiedy tylko zechcecie \U0001F9E1\n"
      happy_birthday: "Cała ekipa Dobrych Wibracji życzy %s wszystkiego najlepszego z okazji urodzin! \U0001F389 Ciesz się swoim dniem i nie wahaj się opowiedzieć, jak będziesz go świętować!\n"
      chart_recall: 'Małe życzliwe przypomnienie: Dobre Wibracje służą do rozmów w dobrej atmosferze i z szacunkiem. Kartę etyczną znajdziecie właśnie tutaj! Dziękujemy wszystkim!

        '
      smalltalk_anniversary_six_months: "Nasza grupa świętuje już sześć miesięcy istnienia! \U0001F389 Dziękujemy za Wasze rozmowy i miłe chwile spędzone razem!\n"
      smalltalk_anniversary_one_year: "Nasza grupa świętuje już rok istnienia! \U0001F389 Dziękujemy za Wasze rozmowy i miłe chwile spędzone razem!\n"
      user_one_year_membership: "Dziś %s świętuje rok wśród nas! \U0001F389 Dziękujemy, że jesteś z nami od tak dawna, opowiedz nam o jakimś ważnym momencie!\n"
      smalltalk_500_messages: "Jesteście niesamowici! \U0001F525 Już 500 wiadomości wymienionych w grupie, rozmowy kwitną! Kontynuujemy? Następny cel: 1000 wiadomości?\n"
      smalltalk_1000_messages: "Niesamowite, właśnie osiągnęliście 1000 wymienionych wiadomości! \U0001F92F Oficjalnie jesteście mistrzami paplaniny!\n"
