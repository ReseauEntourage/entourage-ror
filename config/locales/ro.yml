  onboarding:
    ethical_charter: |
      Sunt din nou eu!

      La Entourage, chiar ținem ca fiecare să se simtă bine, în siguranță, ascultat(ă) și binevenit(ă). De aceea am redactat această cartă etică, pe care toți membrii comunității se angajează să o respecte atunci când se alătură aplicației. O poți consulta aici:

      https://www.entourage.social/app/resources/eMU_InNSSJbE

      Pe curând!

      %s

  outings:
    tasks:
      reminder_content: |
        Acest eveniment se apropie cu pași repezi! Dacă ești în continuare interesat(ă) să participi, te rugăm să comentezi „Particip” la acest mesaj.
      reminder_7_days_with_participants: |
        Bună %{first_name},

        Îți mulțumim mult pentru că ai organizat %{title}, este o inițiativă grozavă pentru a crea legături! 🙌

        👉 Văd că evenimentul tău se apropie și %{count} persoane s-au înscris deja, este super! Ca să le ajuți să nu uite, le poți scrie un mic mesaj în discuția evenimentului.

        Și dacă vrei ca alți vecini să se înscrie, îți recomand să distribui linkul evenimentului în grupul tău din %{neighborhood}: poate face toată diferența! Iată linkul: %{link}

        Dacă ai nevoie de un ajutor, nu ezita să-mi spui.

        Îți mulțumim pentru implicarea ta și dorința de a crea legături 🙏
        Pe curând
      reminder_7_days_without_participants: |
        Bună %{first_name},

        Îți mulțumim mult pentru că ai organizat %{title}, este o inițiativă grozavă pentru a crea legături! 🙌

        Văd că evenimentul tău se apropie, dar nimeni nu s-a înscris încă. Fără panică: de multe ori lucrurile se mișcă chiar în ultimul moment 😉

        Îți recomand să distribui linkul evenimentului în grupul tău din %{neighborhood}: poate face toată diferența! Iată linkul: %{link}

        Dacă ai nevoie de un ajutor, nu ezita să-mi spui.

        Îți mulțumim pentru implicarea ta și dorința de a crea legături 🙏
        Pe curând
      reminder_1_day_with_participants: |
        Bună %{first_name},

        Evenimentul tău %{title} are loc mâine!
        Felicitări pentru această inițiativă frumoasă 💪

        Iată câteva sfaturi simple pentru a crea un moment prietenos și incluziv:

        🌟 Întâmpină fiecare participant(ă) personal, cu un cuvânt cald și un zâmbet
        🌟 Începe cu o activitate de prezentare (jocuri de spart gheața, un tur al prenumelor etc.) pentru a destinde atmosfera
        🌟 Fii atent(ă) la fiecare persoană: ajută-i pe cei care s-ar putea simți puțin retrași să își găsească locul

        La finalul evenimentului, nu ezita să faci o poză de grup (asigurându-te că ai acordul fiecărui participant) și să o postezi în grupul tău de vecini %{neighborhood} 👌

        Îți mulțumim pentru implicare și generozitate. Contribui la crearea unui cartier mai solidar 💛

        Pe curând
      reminder_1_day_without_participants: |
        Bună %{first_name},

        Evenimentul tău %{title} are loc mâine! Felicitări pentru această inițiativă 👏

        Chiar dacă nimeni nu s-a înscris încă, nu e nimic pierdut: vecinii se decid uneori chiar în ultimul moment!

        Iată câteva idei pentru a motiva trupele:
        💬 Trimite un mesaj în discuția evenimentului
        📣 Distribuie linkul în grupul tău de vecini %{neighborhood}
        🤝 Invită direct vecini pe care îi cunoști sau cu care ai mai discutat

        Și dacă în final ești singur(ă) mâine, nu e un eșec! Ai făcut deja partea cea mai grea: să treci la acțiune pentru a crea legături 💛

        Îți mulțumim pentru implicare. Suntem aici dacă ai nevoie de o mână de ajutor 🙌

        Pe curând

