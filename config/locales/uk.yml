  smalltalks:
    messager:
      new_member: | # first_name
        Ласкаво просимо, %s 🙂 Ми раді, що ти приєднався(-лася) до нас! Розкажи трохи про себе, щоб група могла тебе краще пізнати.
      destroy_member: | # first_name
        %s щойно покинув(-ла) групу. Дякуємо за участь і бажаємо тобі всього найкращого!
      banned_member: | # first_name
        %s більше не є частиною групи. Його/її поведінка не зовсім відповідала духу солідарних компаній. Розраховуємо на тебе, щоб і надалі підтримувати цей простір з доброзичливістю та гарним настроєм 🙏
      incomplete: |
        Ми готуємо для тебе чудову групу Добрих Вібрацій ✨ Поки чекаємо на нових учасників, маленький виклик: спробуй вгадати ім'я того чи тієї, хто приєднається наступним. Шансів вгадати небагато... але хто знає? 👀
      close: |
        Усі учасники цієї групи Добрих Вібрацій вирішили покинути розмову, тож тепер ти тут сам(а). Групу закрито. Ти завжди можеш переглянути історію повідомлень і повернутися сюди за потреби.

        Якщо хочеш і далі ділитися Добрими Вібраціями, не соромся створити новий запит, щоб приєднатися до іншої групи. До зустрічі 👋
      complete: |
        Групу укомплектовано! 🎉

        Ласкаво просимо до твоєї групи добрих вібрацій — простору, щоб просто і доброзичливо створювати зв'язки ✨

        Твоя місія: спілкуватися, ділитися і, чому б ні, зустрітися — у відеодзвінку чи в реальному житті?
        Ось посилання на першу спільну відеозустріч: %s

        👋 Не соромся представитися, якщо ще цього не зробив(-ла).

        🔥 А вже завтра... починаються 7 днів невеликих викликів, щоб краще пізнати одне одного і створити справжні зв'язки 🫶

        Розраховуємо на твою активну участь! 😉
      complete_j1: |
        Виклик дня: Три правди, одна брехня: поділись трьома правдивими фактами про себе і одним неправдивим. Іншим треба вгадати, який зайвий!
      complete_j2: |
        Виклик дня: Вчора в моєму житті... Розкажи про свій вчорашній день лише трьома емодзі. Інші мають спробувати вгадати, що сталося!
      complete_j3: |
        Постав групі найцікавіше запитання, на яке ти так і не знайшов(-ла) задовільної відповіді. Подивимось, чи зможе група допомогти тобі про це подумати!
      complete_j4: |
        Виклик дня: Поділись чимось, про що люди не здогадаються з першого погляду: захопленням, звичкою, рисою характеру...
      complete_j5: |
        Виклик дня: Протягом 24 годин одне поширене слово заборонено в групі (наприклад: «так», «я», «їсти»). Якщо хтось його напише... доведеться розповісти кумедну історію про себе!
      complete_j6: |
        Виклик дня: Поділись тим, що допомагає тобі підійти до когось: поглядом, місцем, фразою... або лайфхаком проти сором'язливості!
      complete_j7: |
        Виклик дня: Поділись класною подією, яка скоро відбудеться поруч з тобою або онлайн! Якщо хтось інший згадає ту саму чи схожу подію — можливо, це ідеальний момент піти разом (або зустрітися онлайн)!
      complete_congratulations: | # meeting_url
        Браво всім за участь! Ви знайшли час ділитися, слухати і створювати зв'язки: це вже чудовий результат 🧡

        Тепер настав час для спільної зустрічі! У відеодзвінку чи наживо — момент оживити ваше спілкування, побачити обличчя за словами і продовжити ці добрі вібрації 🤝

        Кілька ідей:

        Спокійний відеодзвінок, кожен(-на) у себе вдома (піжама вітається 😄)

        Кава чи аперитив, якщо ви живете не дуже далеко одне від одного

        Пікнік або спільна активність, якщо є бажання (і дозволяє погода)

        Щоб було легше організуватися, ми створили це посилання на відеозустріч: %s
        Пропонуйте свої ідеї, призначайте час і головне... почувайтеся як вдома ✨
      complete_j21: |
        Привіт усім! 👋

        Сподіваємось, ваше спілкування пройшло добре — письмово, у відеодзвінку чи наживо!
        Якщо є що розповісти або щось пішло не так, обов'язково повідомте нам про це. Команда Entourage тут, щоб вислухати вас і підтримати з усією доброзичливістю 🧡

        А якщо все добре — теж дайте знати! Ваші відгуки допомагають нам і далі розвивати Добрі Вібрації якнайкраще.

        Дякуємо за вашу довіру ✨
      inactive_j3: |
        Привіт, команда! Нам цікаво дізнатися, що спонукало вас приєднатися до цієї групи? 😊
      inactive_j5: |
        Не дуже комфортно писати? Жодних проблем! Можна також обрати спокійний відеодзвінок або каву у вузькому колі ☕

        Ось посилання, щоб легко зустрітися онлайн:
        👉 %s

        Не соромтесь сказати, що вам підходить найкраще — є тисяча способів створити зв'язок 🧡
      inactive_j7: |
        Відчувається, що тут стало трохи тихо…

        Якщо протягом наступних 7 днів не буде жодного повідомлення, групу буде закрито автоматично.

        Дякуємо, що були з нами. І якщо у вас ще є бажання створювати зв'язки, Добрі Вібрації завжди приймуть вас знову, коли захочете 🧡
      happy_birthday: | # first_name
        Уся компанія Добрих Вібрацій вітає %s з днем народження! 🎉 Насолоджуйся своїм днем і розкажи нам, як плануєш його відсвяткувати!
      chart_recall: |
        Невеличке доброзичливе нагадування: Добрі Вібрації створені для спілкування в гарному настрої та повазі. Етичний кодекс можна знайти тут! Дякуємо всім!
      smalltalk_anniversary_six_months: |
        Сьогодні нашій групі виповнюється вже шість місяців! 🎉 Дякуємо за спілкування та приємні моменти, проведені разом!
      smalltalk_anniversary_one_year: |
        Сьогодні нашій групі виповнюється вже рік! 🎉 Дякуємо за спілкування та приємні моменти, проведені разом!
      user_one_year_membership: | # first_name
        Сьогодні %s святкує 1 рік з нами! 🎉 Дякуємо, що ти з нами весь цей час, розкажи нам про якийсь незабутній момент!
      smalltalk_500_messages: |
        Ви на вогні! 🔥 У групі вже обмінялися 500 повідомленнями, тут активно спілкуються! Продовжуємо в тому ж дусі? Наступна мета: 1000 повідомлень?
      smalltalk_1000_messages: |
        Неймовірно, ви щойно досягли позначки в 1000 повідомлень! 🤯 Ви офіційно чемпіони(-онки) Добрих Вібрацій!

