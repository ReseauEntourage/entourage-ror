  onboarding:
    ethical_charter: |
      Це знову я!

      В Entourage нам дуже важливо, щоб кожен(-на) почувався(-лася) добре, у безпеці, почутим(-ою) та прийнятим(-ою). Саме тому ми написали цю етичну хартію, яку всі учасники спільноти зобов'язуються дотримуватися, приєднуючись до застосунку. Ознайомся з нею тут:

      https://www.entourage.social/app/resources/eMU_InNSSJbE

      До зустрічі!

      %s


  outings:
    tasks:
      reminder_content: |
        Ця подія вже зовсім скоро! Якщо ти все ще хочеш взяти участь, будь ласка, напиши "Я йду" в коментарі до цього повідомлення.
      reminder_7_days_with_participants: |
        Привіт, %{first_name},

        Дуже дякуємо за організацію %{title}, це чудова ініціатива, щоб створювати зв'язки! 🙌

        👉 Бачу, що твоя подія вже наближається і %{count} людей вже записалися, це супер! Щоб допомогти їм не забути, можеш написати їм невелике повідомлення в обговоренні події.

        А якщо хочеш, щоб записалося ще більше сусідів, раджу поділитися посиланням на подію у своїй групі %{neighborhood}: це може все змінити! Ось посилання: %{link}

        Якщо тобі потрібна допомога, не соромся сказати мені про це.

        Дякую за твою залученість і бажання створювати зв'язки 🙏
        До зустрічі
      reminder_7_days_without_participants: |
        Привіт, %{first_name},

        Дуже дякуємо за організацію %{title}, це чудова ініціатива, щоб створювати зв'язки! 🙌

        Бачу, що твоя подія вже наближається, але поки що ніхто не записався. Не хвилюйся: часто все вирішується в останню хвилину 😉

        Раджу поділитися посиланням на подію у своїй групі %{neighborhood}: це може все змінити! Ось посилання: %{link}

        Якщо тобі потрібна допомога, не соромся сказати мені про це.

        Дякую за твою залученість і бажання створювати зв'язки 🙏
        До зустрічі
      reminder_1_day_with_participants: |
        Привіт, %{first_name},

        Твоя подія %{title} відбудеться завтра!
        Великий молодець за цю чудову ініціативу 💪

        Ось кілька простих порад, щоб створити теплу й дружню атмосферу:

        🌟 Зустрічай кожного учасника(-цю) особисто, з добрим словом та посмішкою
        🌟 Почни зі знайомства (криголами, коло імен тощо), щоб розслабити атмосферу
        🌟 Будь уважним(-ою) до кожного: допоможи тим, хто почувається осторонь, знайти своє місце

        Наприкінці події не соромся зробити групове фото (заручившись згодою кожного учасника) і опублікувати його у своїй сусідській групі %{neighborhood} 👌

        Дякуємо за твою залученість і щедрість. Ти допомагаєш зробити квартал більш згуртованим 💛

        До зустрічі
      reminder_1_day_without_participants: |
        Привіт, %{first_name},

